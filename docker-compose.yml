services:

  mongodb:
    image: mongo:latest
    container_name: notes-mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend

    container_name: notes-backend

    ports:
      - "5000:5000"

    environment:
      MONGO_URL: mongodb://mongodb:27017/notesdb

    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend

    container_name: notes-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  mongo-data: